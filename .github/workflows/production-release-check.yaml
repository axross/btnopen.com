name: Production Release Check
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
on:
  repository_dispatch:
    types:
      - "vercel.deployment.ready"
concurrency:
  group: ${{ github.workflow }}
jobs:
  db-migration:
    name: DB Migration
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 30
    permissions:
      actions: read
      statuses: write
    env:
      LIBSQL_PAYLOAD_TURSO_AUTH_TOKEN: ${{ secrets.LIBSQL_PAYLOAD_TURSO_AUTH_TOKEN }}
      LIBSQL_PAYLOAD_TURSO_DATABASE_URL: ${{ secrets.LIBSQL_PAYLOAD_TURSO_DATABASE_URL }}
    steps:
      - name: Notify Vercel
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm
      - name: Install Dependencies
        run: npm ci
      - name: Push Database Migrations
        run: npx payload migrate | npx pino-pretty
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 30
    permissions:
      actions: read
      statuses: write
    env:
      PLAYWRIGHT_BASE_URL: ${{ github.event.client_payload.url }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
      PAYLOAD_TEST_USER_EMAIL: ${{ secrets.PAYLOAD_TEST_USER_EMAIL }}
      PAYLOAD_TEST_USER_PASSWORD: ${{ secrets.PAYLOAD_TEST_USER_PASSWORD }}
    needs:
      - db-migration
    steps:
      - name: Notify Vercel
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm
      - name: Install Dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright Tests
        run: npx playwright test
      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: Playwright Results
          path: .playwright-results/
          include-hidden-files: true
          retention-days: 14
