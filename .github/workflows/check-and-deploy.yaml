name: Check and Deploy
on:
  push:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm
      - name: Install Dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      statuses: write
      contents: write
      pull-requests: write
    env:
      PAYLOAD_TEST_USER_EMAIL: ${{ secrets.PAYLOAD_TEST_USER_EMAIL }}
      PAYLOAD_TEST_USER_PASSWORD: ${{ secrets.PAYLOAD_TEST_USER_PASSWORD }}
    needs:
      - lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm
      - name: Install Dependencies
        run: npm ci
      - name: Install Playwright Browsers
        # install only chromium (the active `setup`/`pixel` projects' engine).
        # a stalled download has no idle timeout, so cap the step to fail fast.
        timeout-minutes: 10
        run: npx playwright install --with-deps chromium
      - name: Push Database Migrations
        run: npm run migrate:up
      - name: Run Playwright Tests
        run: npx playwright test --update-snapshots
      - name: Create Pull Request for Snapshot Updates
        if: ${{ !cancelled() }}
        uses: peter-evans/create-pull-request@v8
        with:
          branch: snapshot-updates/${{ github.ref_name }}
          add-paths: e2e/**/__snapshots__/**
          title: "chore: update playwright test snapshots"
          body: |
            Updates Playwright test snapshot files changed in a GitHub Actions run.

            GitHub Actions Run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            Original Changes: [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            *This pull request is automatically created by GitHub Actions.*
          commit-message: |
            chore: update playwright test snapshots

            GitHub Actions Run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            Original Changes: [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: Playwright Results
          path: .playwright-results/
          include-hidden-files: true
          retention-days: 14
  deployment:
    name: Production Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - e2e-tests
    # grants access to the `Production` github environment's
    # LIBSQL_PAYLOAD_TURSO_DATABASE_URL variable and its
    # LIBSQL_PAYLOAD_TURSO_AUTH_TOKEN and BLOB_PAYLOAD_READ_WRITE_TOKEN
    # secrets, referenced by the migration steps below.
    environment: Production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm
      - name: Install Dependencies
        run: npm ci
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Pull Vercel Environment Variables
        # `payload migrate` loads env from root-level `.env*` files only, so the
        # variables `vercel pull` caches under `.vercel/` never reach it.
        run: vercel env pull .env.local --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Verify Production Credentials
        # `payload migrate` builds the entire Payload config, so it needs both
        # the sqlite database credentials and the Vercel Blob token: the sqlite
        # adapter silently falls back to a local file when the url or auth token
        # is empty (migrations never reach the production database), and the blob
        # adapter validates its token format at config-build time and throws on a
        # non-conforming value (aborting the command before it migrates). The
        # auth token and blob token are sensitive vercel variables that
        # `vercel env pull` cannot retrieve — it writes an unusable value (empty
        # or a non-conforming placeholder) to .env.local — so all three are
        # sourced from the `Production` github environment instead. The pulled
        # lines are deleted so the env-file loader can never shadow the values
        # passed to the migration step through the process environment.
        env:
          LIBSQL_PAYLOAD_TURSO_DATABASE_URL: ${{ vars.LIBSQL_PAYLOAD_TURSO_DATABASE_URL }}
          LIBSQL_PAYLOAD_TURSO_AUTH_TOKEN: ${{ secrets.LIBSQL_PAYLOAD_TURSO_AUTH_TOKEN }}
          BLOB_PAYLOAD_READ_WRITE_TOKEN: ${{ secrets.BLOB_PAYLOAD_READ_WRITE_TOKEN }}
        run: |
          test -n "${LIBSQL_PAYLOAD_TURSO_DATABASE_URL}"
          test -n "${LIBSQL_PAYLOAD_TURSO_AUTH_TOKEN}"
          test -n "${BLOB_PAYLOAD_READ_WRITE_TOKEN}"
          sed --in-place --regexp-extended '/^(LIBSQL_PAYLOAD_TURSO_(DATABASE_URL|AUTH_TOKEN)|BLOB_PAYLOAD_READ_WRITE_TOKEN)=/d' .env.local
      - name: Push Database Migrations
        env:
          LIBSQL_PAYLOAD_TURSO_DATABASE_URL: ${{ vars.LIBSQL_PAYLOAD_TURSO_DATABASE_URL }}
          LIBSQL_PAYLOAD_TURSO_AUTH_TOKEN: ${{ secrets.LIBSQL_PAYLOAD_TURSO_AUTH_TOKEN }}
          BLOB_PAYLOAD_READ_WRITE_TOKEN: ${{ secrets.BLOB_PAYLOAD_READ_WRITE_TOKEN }}
        run: npm run migrate:up
      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
