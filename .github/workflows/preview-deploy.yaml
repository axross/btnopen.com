name: Preview Deploy

# Per-pull-request Vercel preview deployments backed by an isolated Turso
# database seeded from the repository's own fixtures, so the maintainer can
# review the actual look and feel of a change without any production data — or
# production credentials — ever reaching a preview. Each PR gets a fresh, empty
# database created from scratch; that database is migrated, wired into a Vercel
# preview deployment (which self-seeds from `payload/helpers/seed.ts` on first
# boot), and destroyed when the PR closes. Uploaded media goes to a dedicated
# preview Blob store under a per-PR `pr-<n>/` prefix, pruned on close. See
# .claude/skills/development-guidelines/references/preview-deployments.md for
# the architecture and the required one-time account setup, and
# .claude/skills/application-security-requirements/references/privacy-and-exposure.md
# for the data-exposure trade-offs.
#
# The pipeline is inert until that setup exists: the `preflight` job skips the
# deploy/teardown jobs whenever the required secrets/vars are absent (including
# forked pull requests, which never receive secrets), so merging this workflow
# changes nothing on its own.

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
  # A maintainer-only manual entry point (workflow_dispatch is write-access
  # gated) to deploy, teardown, or recreate a specific pull request's preview
  # without the fragile close→reopen dance. `recreate` runs teardown then a
  # fresh, re-seeded deploy sequentially in one run (see the deploy job's
  # `needs`/`if`), sidestepping the concurrency-cancellation race that a manual
  # close→reopen risks. Only surfaced once this workflow is on the default
  # branch, and a dispatch runs the default branch's version of the workflow.
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number whose preview to act on
        required: true
        type: number
      action:
        description: What to do with the pull request's preview
        required: true
        type: choice
        default: recreate
        options:
          - recreate
          - deploy
          - teardown

# One preview per pull request; supersede an in-flight deploy when a newer
# commit arrives. Migrations and `vercel deploy` are idempotent, so a cancelled
# run leaves nothing half-applied that the next run does not reconcile. The
# group falls through to the dispatch input's PR number when the event carries
# no pull request, so a manual run and an event-driven run for the same PR
# share a group and never collide.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      # `pull-requests: read` lets the change-detection step below list the
      # pull request's files (pulls.listFiles). A job-level permissions block
      # replaces the top-level default, so `contents: read` is restated here.
      pull-requests: read
    outputs:
      ready: ${{ steps.check.outputs.ready }}
      # Empty on the `closed` event and on every `workflow_dispatch` run (the
      # detection step is skipped there); the deploy job only consults this on
      # its `pull_request` non-closed branch, so an empty value is harmless.
      source-changed: ${{ steps.changes.outputs.source-changed }}
      # The pull request the run acts on, resolved from the event
      # (`pull_request`) or from the `pr_number` input (`workflow_dispatch`) so
      # the deploy/teardown jobs work identically under either trigger.
      pr-number: ${{ steps.resolve.outputs.pr-number }}
      head-sha: ${{ steps.resolve.outputs.head-sha }}
    steps:
      - name: Check Required Configuration
        id: check
        # Secrets are only readable inside a step, so the gate lives here and is
        # surfaced to downstream jobs as an output. Missing configuration is a
        # clean skip, never a failure.
        env:
          TURSO_API_TOKEN: ${{ secrets.TURSO_API_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          # Previews are seeded from repo fixtures, not branched from
          # production, so no parent-database variable is required here.
          if [ -n "${TURSO_API_TOKEN}" ] \
            && [ -n "${VERCEL_TOKEN}" ] \
            && [ -n "${VERCEL_ORG_ID}" ] \
            && [ -n "${VERCEL_PROJECT_ID}" ]; then
            echo "ready=true" >> "${GITHUB_OUTPUT}"
          else
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::Preview deploy skipped: required secrets/vars are not configured. See .claude/skills/development-guidelines/references/preview-deployments.md."
          fi
      - name: Detect Deploy-Affecting Changes
        id: changes
        # A preview build only earns its Vercel credit when the pull request
        # changes something the deployed site actually renders. Classify every
        # file the PR touches against a denylist of non-deployable paths — agent
        # skills, docs, CI, e2e tests, and editor/tooling config — and mark the
        # deploy as needed unless *every* changed file is non-deployable. This
        # is a denylist, so any unlisted or newly added path counts as
        # deployable: a missed preview is worse than a redundant one. Skipped on
        # `closed` (teardown never consults this), and it fails safe toward
        # deploying — an API error or a truncated (>= 3000) file list yields
        # `source-changed=true` rather than a silent skip. A manual
        # `workflow_dispatch` is an explicit, intentional action, so it skips
        # this push-only gate entirely — the deploy job never consults
        # `source-changed` on its dispatch branch.
        if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
        uses: actions/github-script@v7
        with:
          script: |
            // Non-deployable path prefixes and exact root files. Keep in sync
            // with the deploy-affecting-path guideline in
            // .claude/skills/development-guidelines/references/preview-deployments.md.
            const ignoredPrefixes = [
              ".claude/",
              ".github/",
              "e2e/",
              ".vscode/",
              ".zed/",
              ".data/",
            ];
            const ignoredExactPaths = new Set([
              "AGENTS.md",
              "CLAUDE.md",
              "README.md",
              "REVIEW.md",
              ".mcp.json",
              ".pino-prettyrc",
              ".gitignore",
            ]);
            const isNonDeployable = (path) =>
              ignoredExactPaths.has(path) ||
              ignoredPrefixes.some((prefix) => path.startsWith(prefix));

            let files;
            try {
              files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                per_page: 100,
              });
            } catch (error) {
              // Fail safe: if the file list cannot be read, deploy rather than
              // silently skip a preview a reviewer may be waiting on.
              core.warning(`Could not list pull request files (${error.message}); deploying.`);
              core.setOutput("source-changed", "true");
              return;
            }

            // `pulls.listFiles` caps at 3000 files, so an empty or capped list
            // is ambiguous — fall back to deploying.
            const paths = files.map((file) => file.filename);
            const sourceChanged =
              paths.length === 0 ||
              paths.length >= 3000 ||
              paths.some((path) => !isNonDeployable(path));

            if (sourceChanged) {
              core.setOutput("source-changed", "true");
            } else {
              core.setOutput("source-changed", "false");
              core.notice(
                "Preview deploy skipped: the pull request changes only non-deployable paths (agent skills, docs, CI, e2e tests, or editor/tooling config).",
              );
            }
      - name: Resolve Pull Request Context
        id: resolve
        # The deploy/teardown jobs read the PR number and head SHA from
        # `github.event.pull_request.*`, which is absent under
        # `workflow_dispatch`. Resolve both here — from the event on a
        # `pull_request` run, or from the `pr_number` input via the PRs API on a
        # manual run — and expose them as job outputs the downstream jobs
        # consume uniformly. Runs on `closed` too (the event still carries the
        # pull request), so teardown can key on the resolved number.
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber;
            let headSha;
            if (process.env.EVENT_NAME === "workflow_dispatch") {
              prNumber = Number(process.env.INPUT_PR_NUMBER);
              if (!Number.isInteger(prNumber) || prNumber <= 0) {
                core.setFailed(
                  `Invalid pr_number input: ${process.env.INPUT_PR_NUMBER}`,
                );
                return;
              }
              const { data: pullRequest } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              headSha = pullRequest.head.sha;
            } else {
              prNumber = context.payload.pull_request.number;
              headSha = context.payload.pull_request.head.sha;
            }
            core.setOutput("pr-number", String(prNumber));
            core.setOutput("head-sha", headSha);

  deploy:
    name: Deploy Preview
    # Also `needs: teardown` so `recreate` runs the destroy *before* this fresh
    # deploy (which then re-provisions and re-seeds). `!cancelled()` keeps this
    # job running when teardown is *skipped* (every non-recreate path) without
    # firing it on a superseded/cancelled run, while the result check makes a
    # `recreate` deploy wait for — and only proceed on — a successful teardown,
    # never deploying onto a half-destroyed preview. Because `!cancelled()` is a
    # status function, this `if` is also evaluated when `preflight` *fails*, and
    # `preflight` can emit `ready=true` from its first step yet still fail if the
    # later resolve step throws (e.g. a bad `pr_number`) — leaving `head-sha`
    # empty and the checkout falling back to the default branch. The explicit
    # `needs.preflight.result == 'success'` guard blocks the deploy in that case.
    needs:
      - preflight
      - teardown
    # Gate on the deploy-affecting-path check for the automatic push path: a
    # pull request whose entire diff is non-deployable (agent skills, docs, CI,
    # e2e tests, editor config) skips the Vercel build so it spends no preview
    # credit. A manual `workflow_dispatch` deploys whenever its action is
    # `deploy` or `recreate`, bypassing that push-only path check. Teardown
    # below is deliberately left ungated on close, so a preview is always
    # cleaned up.
    if: >-
      ${{
        !cancelled()
        && needs.preflight.result == 'success'
        && needs.preflight.outputs.ready == 'true'
        && (needs.teardown.result == 'success' || needs.teardown.result == 'skipped')
        && (
          (
            github.event_name == 'pull_request'
            && github.event.action != 'closed'
            && needs.preflight.outputs.source-changed == 'true'
          )
          || (
            github.event_name == 'workflow_dispatch'
            && (inputs.action == 'deploy' || inputs.action == 'recreate')
          )
        )
      }}
    runs-on: ubuntu-latest
    # The `PAYLOAD_TEST_USER_*` seed credentials are environment-scoped secrets
    # with a Preview-specific value (distinct from Production), so this job
    # declares the `Preview` environment to read them and inject them into the
    # deployment below. Repository-level secrets (VERCEL_*, TURSO_API_TOKEN)
    # stay available. Keep the `Preview` environment free of protection rules
    # that would gate auto-deploys.
    environment: Preview
    timeout-minutes: 20
    permissions:
      contents: read
      # `issues: write` is required for the github-script comment step: PR
      # comments post through the Issues API (issues.createComment), which is
      # scoped under `issues`, not `pull-requests`. With an explicit permissions
      # block, every unlisted scope defaults to `none`, so omitting it would 403
      # and fail the job.
      issues: write
      pull-requests: write
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      TURSO_API_TOKEN: ${{ secrets.TURSO_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # A `pull_request` run checks out its default ref (unchanged). A manual
          # `workflow_dispatch` defaults to the branch it was dispatched from, so
          # check out the resolved PR head instead — the deploy must build and
          # re-seed from the pull request's own current fixtures, not the default
          # branch's. An empty `ref` falls back to checkout's default behavior.
          ref: ${{ github.event_name == 'workflow_dispatch' && needs.preflight.outputs.head-sha || '' }}
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm
      - name: Install Dependencies
        run: npm ci
      - name: Install Turso CLI
        run: |
          set -euo pipefail
          curl --silent --show-error --location --fail https://get.tur.so/install.sh | bash
          echo "${HOME}/.turso" >> "${GITHUB_PATH}"
      - name: Provision Turso Branch Database
        id: turso
        # Create a fresh, empty database for this PR — never branched from
        # production, so no production data or credentials can reach the
        # preview. Idempotent across `synchronize` events: `turso db create`
        # is attempted every run and only its "already exists" error is
        # tolerated, so an existing database is reused (edits made in the
        # preview survive re-deploys) and its schema is (re-)applied below.
        # This mirrors the teardown's `destroy … || …` idempotency and, unlike
        # a `turso db show` pre-check, cannot misfire into a spurious create
        # when `show` times out or errors transiently. Any other create error
        # still fails the step loudly.
        env:
          TURSO_GROUP: ${{ vars.TURSO_GROUP }}
        run: |
          set -euo pipefail
          database="preview-pr-${{ needs.preflight.outputs.pr-number }}"
          create=(turso db create "${database}")
          if [ -n "${TURSO_GROUP}" ]; then
            create+=(--group "${TURSO_GROUP}")
          fi
          if output="$("${create[@]}" 2>&1)"; then
            echo "::notice::Created database ${database}."
          elif printf '%s\n' "${output}" | grep -qi 'already exists'; then
            echo "::notice::Database ${database} already exists; reusing it."
          else
            printf '%s\n' "${output}" >&2
            exit 1
          fi
          url="$(turso db show "${database}" --url)"
          token="$(turso db tokens create "${database}")"
          echo "::add-mask::${token}"
          echo "database=${database}" >> "${GITHUB_OUTPUT}"
          echo "url=${url}" >> "${GITHUB_OUTPUT}"
          echo "token=${token}" >> "${GITHUB_OUTPUT}"
      - name: Push Database Migrations
        # Build the schema on the fresh, empty database from the repository's
        # migration files. Idempotent across `synchronize` events: once applied,
        # re-running is a no-op. Seed data is created separately, at runtime, by
        # the app's onInit seed on first boot (gated on the PAYLOAD_TEST_USER_*
        # variables configured in the Vercel Preview environment).
        env:
          LIBSQL_PAYLOAD_TURSO_DATABASE_URL: ${{ steps.turso.outputs.url }}
          LIBSQL_PAYLOAD_TURSO_AUTH_TOKEN: ${{ steps.turso.outputs.token }}
        run: npm run migrate:up
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Deploy Preview to Vercel
        id: deploy
        # Inject this PR's credentials for this deployment only, at both build
        # and runtime, so they override the project's Preview environment for
        # this deploy alone: the per-PR database credentials, the media prefix,
        # and the Preview-scoped PAYLOAD_TEST_USER_* seed credentials (read from
        # the `Preview` GitHub environment declared on this job). The production
        # credentials must be scoped to the Production environment in Vercel and
        # are never passed here.
        #
        # `BLOB_PAYLOAD_PREFIX` namespaces this PR's uploaded media under a
        # `pr-<n>/` path in the Blob store so a preview's media is isolated and
        # can be pruned wholesale on teardown (production leaves this unset).
        env:
          LIBSQL_URL: ${{ steps.turso.outputs.url }}
          LIBSQL_TOKEN: ${{ steps.turso.outputs.token }}
          BLOB_PREFIX: pr-${{ needs.preflight.outputs.pr-number }}
          TEST_USER_EMAIL: ${{ secrets.PAYLOAD_TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.PAYLOAD_TEST_USER_PASSWORD }}
        run: |
          set -euo pipefail
          # `vercel deploy` prints progress to stderr and the deployment URL to
          # stdout; take the last stdout line to be robust to any extra output.
          url="$(vercel deploy \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --env LIBSQL_PAYLOAD_TURSO_DATABASE_URL="${LIBSQL_URL}" \
            --env LIBSQL_PAYLOAD_TURSO_AUTH_TOKEN="${LIBSQL_TOKEN}" \
            --env BLOB_PAYLOAD_PREFIX="${BLOB_PREFIX}" \
            --env PAYLOAD_TEST_USER_EMAIL="${TEST_USER_EMAIL}" \
            --env PAYLOAD_TEST_USER_PASSWORD="${TEST_USER_PASSWORD}" \
            --build-env LIBSQL_PAYLOAD_TURSO_DATABASE_URL="${LIBSQL_URL}" \
            --build-env LIBSQL_PAYLOAD_TURSO_AUTH_TOKEN="${LIBSQL_TOKEN}" \
            --build-env BLOB_PAYLOAD_PREFIX="${BLOB_PREFIX}" \
            --build-env PAYLOAD_TEST_USER_EMAIL="${TEST_USER_EMAIL}" \
            --build-env PAYLOAD_TEST_USER_PASSWORD="${TEST_USER_PASSWORD}" | tail -n1)"
          echo "url=${url}" >> "${GITHUB_OUTPUT}"
      - name: Assign Stable Preview Alias
        id: alias
        # `vercel deploy` returns a per-commit URL (…-<hash>-<scope>.vercel.app)
        # that changes on every push. Re-point a deterministic per-PR alias at
        # this deployment so the pull request's preview URL stays stable across
        # pushes and always serves the newest build. The alias label defaults to
        # the repository name's first dot-delimited label (its site name, e.g.
        # `btnopen` from `btnopen.com`) and can be overridden with the optional
        # `VERCEL_PREVIEW_ALIAS_PREFIX` variable. Aliasing is scoped by the same
        # VERCEL_ORG_ID / VERCEL_PROJECT_ID the deploy step relies on. Fail loud
        # if it fails: a stable URL is the whole point, so silently falling back
        # to the per-commit URL would defeat the change.
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
          ALIAS_PREFIX: ${{ vars.VERCEL_PREVIEW_ALIAS_PREFIX }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ needs.preflight.outputs.pr-number }}
        run: |
          set -euo pipefail
          prefix="${ALIAS_PREFIX}"
          if [ -z "${prefix}" ]; then
            # Reduce the repository name to a valid .vercel.app label: drop any
            # domain suffix (keep only the first dot-delimited label), lowercase,
            # runs of non-alphanumerics collapsed to a single `-`, ends trimmed.
            prefix="$(printf '%s' "${REPOSITORY_NAME}" \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's/\..*$//; s/[^a-z0-9]\+/-/g; s/^-//; s/-$//')"
          fi
          alias="${prefix}-pr-${PR_NUMBER}.vercel.app"
          vercel alias set "${DEPLOYMENT_URL}" "${alias}" --token="${{ secrets.VERCEL_TOKEN }}"
          echo "url=https://${alias}" >> "${GITHUB_OUTPUT}"
      - name: Comment Preview URL
        uses: actions/github-script@v7
        env:
          # The stable per-PR alias, not the per-commit deployment URL.
          PREVIEW_URL: ${{ steps.alias.outputs.url }}
          # From preflight outputs, not the event context, so the comment
          # renders identically under `workflow_dispatch` (where
          # `context.issue.number` / `context.payload.pull_request.*` are absent).
          PR_NUMBER: ${{ needs.preflight.outputs.pr-number }}
          HEAD_SHA: ${{ needs.preflight.outputs.head-sha }}
        with:
          script: |
            const url = process.env.PREVIEW_URL;
            const prNumber = process.env.PR_NUMBER;
            const database = `preview-pr-${prNumber}`;
            const sha = process.env.HEAD_SHA.slice(0, 7);
            // Post a new comment on every deploy (never edit a prior one), so
            // each build lands a fresh, timeline-visible entry. The URL is
            // stable, so the short SHA records which commit this entry deployed.
            const body = [
              "### 🚀 Preview deployment",
              "",
              url,
              "",
              `Deployed \`${sha}\`. Served by an isolated Turso database (\`${database}\`) seeded from repository fixtures — no production data — with media in a dedicated preview store; both are destroyed automatically when this pull request closes. This URL is stable for the pull request and always serves the latest preview.`,
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(prNumber),
              body,
            });

  teardown:
    name: Teardown Preview
    needs: preflight
    # Runs when the pull request closes (automatic) or when a manual
    # `workflow_dispatch` asks to `teardown` or `recreate`. For `recreate` the
    # deploy job `needs` this job, so the destroy completes before the fresh
    # deploy re-provisions.
    if: >-
      ${{
        needs.preflight.outputs.ready == 'true'
        && (
          (github.event_name == 'pull_request' && github.event.action == 'closed')
          || (
            github.event_name == 'workflow_dispatch'
            && (inputs.action == 'teardown' || inputs.action == 'recreate')
          )
        )
      }}
    runs-on: ubuntu-latest
    # The media-prune step reads BLOB_PAYLOAD_READ_WRITE_TOKEN, which is scoped
    # to the `Preview` GitHub Actions environment, so this job must declare that
    # environment to access it. Repository-level secrets (TURSO_API_TOKEN) stay
    # available. Keep the `Preview` environment free of protection rules that
    # would gate teardown (it runs on PR close and must not require approval).
    environment: Preview
    timeout-minutes: 10
    permissions:
      contents: read
      # `issues: write` is required for the github-script comment step: PR
      # comments post through the Issues API (issues.createComment), which is
      # scoped under `issues`, not `pull-requests`. With an explicit permissions
      # block, every unlisted scope defaults to `none`, so omitting it would 403
      # and fail the job.
      issues: write
      pull-requests: write
    env:
      TURSO_API_TOKEN: ${{ secrets.TURSO_API_TOKEN }}
    steps:
      - name: Checkout
        # Needed only for the blob-prune script below; the Turso teardown does
        # not read the repository.
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - name: Install Turso CLI
        run: |
          set -euo pipefail
          curl --silent --show-error --location --fail https://get.tur.so/install.sh | bash
          echo "${HOME}/.turso" >> "${GITHUB_PATH}"
      - name: Destroy Turso Branch Database
        # Tolerate an already-absent database so re-runs and manual cleanups do
        # not fail the job.
        run: |
          set -euo pipefail
          database="preview-pr-${{ needs.preflight.outputs.pr-number }}"
          turso db destroy "${database}" --yes || echo "::notice::${database} was already absent."
      - name: Prune Preview Media
        # Delete every blob this PR wrote under its `pr-<n>/` prefix in the
        # dedicated preview Blob store. Runs in an isolated scratch directory
        # with a standalone `@vercel/blob` install, so it never depends on the
        # repository's own lockfile. Inert (a clean skip, not a failure) when
        # the preview store token is not configured.
        env:
          BLOB_TOKEN: ${{ secrets.BLOB_PAYLOAD_READ_WRITE_TOKEN }}
          PR_NUMBER: ${{ needs.preflight.outputs.pr-number }}
        run: |
          set -euo pipefail
          if [ -z "${BLOB_TOKEN}" ]; then
            echo "::notice::Preview media prune skipped: BLOB_PAYLOAD_READ_WRITE_TOKEN is not configured."
            exit 0
          fi
          workdir="$(mktemp -d)"
          cp scripts/prune-preview-blobs.mjs "${workdir}/"
          cd "${workdir}"
          npm init --yes >/dev/null 2>&1
          npm install --no-audit --no-fund --no-package-lock @vercel/blob@^2 >/dev/null
          BLOB_PAYLOAD_READ_WRITE_TOKEN="${BLOB_TOKEN}" \
            node prune-preview-blobs.mjs "pr-${PR_NUMBER}/"
      - name: Comment Preview Torn Down
        uses: actions/github-script@v7
        env:
          # From the preflight output, not the event context, so the comment
          # renders under `workflow_dispatch` (where `context.issue.number` is
          # absent) as well as on a `closed` event.
          PR_NUMBER: ${{ needs.preflight.outputs.pr-number }}
        with:
          script: |
            const prNumber = process.env.PR_NUMBER;
            const database = `preview-pr-${prNumber}`;
            // Post a distinct teardown comment rather than editing a prior
            // preview comment, consistent with the append-a-comment-per-deploy
            // model: the timeline keeps the full deploy-then-teardown history.
            const body = [
              "### 🚀 Preview deployment",
              "",
              `Torn down — the isolated Turso database (\`${database}\`) and this pull request's preview media were destroyed.`,
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(prNumber),
              body,
            });
