name: Preview Teardown
on:
  pull_request:
    types:
      - closed
concurrency:
  # share the deploy workflow's group so a close cancels any in-flight deploy
  # for the same pull request before destroying its database.
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true
jobs:
  teardown:
    name: Destroy Preview Database
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    env:
      TURSO_API_TOKEN: ${{ secrets.TURSO_API_TOKEN }}
      TURSO_PRODUCTION_DB_NAME: ${{ vars.TURSO_PRODUCTION_DB_NAME }}
      PREVIEW_DB_NAME: btnopen-preview-pr-${{ github.event.pull_request.number }}
    steps:
      - name: Install Turso CLI
        run: |
          curl --silent --show-error --location https://get.tur.so/install.sh | bash
          echo "$HOME/.turso" >> "$GITHUB_PATH"
      - name: Guard Against Destroying the Production Database
        # never let a misconfiguration point this destructive step at production.
        run: |
          test -n "$TURSO_PRODUCTION_DB_NAME"
          test -n "$PREVIEW_DB_NAME"
          test "$PREVIEW_DB_NAME" != "$TURSO_PRODUCTION_DB_NAME"
          case "$PREVIEW_DB_NAME" in
            btnopen-preview-pr-*) : ;;
            *)
              echo "Refusing to destroy unexpected database: $PREVIEW_DB_NAME" >&2
              exit 1
              ;;
          esac
      - name: Destroy Preview Database
        run: |
          if turso db show "$PREVIEW_DB_NAME" >/dev/null 2>&1; then
            turso db destroy "$PREVIEW_DB_NAME" --yes
            echo "Destroyed $PREVIEW_DB_NAME."
          else
            echo "$PREVIEW_DB_NAME does not exist; nothing to destroy."
          fi
      - name: Update the Preview Comment
        uses: actions/github-script@v7
        env:
          PREVIEW_DB_NAME: ${{ env.PREVIEW_DB_NAME }}
        with:
          script: |
            const marker = "<!-- preview-deployment -->";
            const db = process.env.PREVIEW_DB_NAME;
            const body = [
              marker,
              "### 🔎 Preview deployment",
              "",
              `The preview environment for this pull request has been torn down and its isolated database \`${db}\` was destroyed.`,
              "",
              "<sub>Automated by the Preview Teardown workflow.</sub>",
            ].join("\n");
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            }
