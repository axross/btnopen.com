name: Production Deployment
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
on:
  push:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true
jobs:
  promotion:
    name: Promotion
    runs-on: ubuntu-latest
    environment: Production Promotion
    timeout-minutes: 15
    steps:
      - name: Approved
        run: echo "Approved"
  deployment:
    name: Deployment (Production)
    runs-on: ubuntu-latest
    needs: promotion
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"
      - name: Install Dependencies
        run: npm ci
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel Environment Information
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build Project Artifacts
        run: npx vercel build --target=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Push Database Migrations
        run: npx payload migrate | npx pino-pretty
      - name: Deploy Project Artifacts to Vercel
        run: npx vercel deploy --prebuilt --target=production --token=${{ secrets.VERCEL_TOKEN }}
