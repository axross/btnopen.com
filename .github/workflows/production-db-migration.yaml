name: Production DB Migration
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  LIBSQL_PAYLOAD_TURSO_AUTH_TOKEN: ${{ secrets.LIBSQL_PAYLOAD_TURSO_AUTH_TOKEN }}
  LIBSQL_PAYLOAD_TURSO_DATABASE_URL: ${{ secrets.LIBSQL_PAYLOAD_TURSO_DATABASE_URL }}
on:
  repository_dispatch:
    types:
      - "vercel.deployment.ready"
concurrency:
  group: ${{ github.workflow }}
jobs:
  migration:
    name: DB Migration
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 30
    permissions:
      actions: read
      statuses: write
    steps:
      - name: Notify Vercel
        uses: "vercel/repository-dispatch/actions/status@v1"
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"
      - name: Install Dependencies
        run: npm ci
      - name: Push Database Migrations
        run: npx payload migrate | npx pino-pretty
